data:
  batch_size: 256
  num_workers: 10
  val_ratio: 0.1

optim:
  algo: AdamW
  params:
    weight_decay: 0.02
    betas: (0.9, 0.95)
    lr: 4e-4

earlystopping:
  state: False
  patience: 5
  min_delta: 0

scheduler:
  ROPscheduler:
    state: False
    factor: 0.5
    patience: 2
    threshold: 0.001
  Cosine:
    warmup:
      n_epochs: 5
      start_factor: 0.01
      end_factor: 1.0


nepochs: 300
loss: "CrossEntropyLoss"
amp: True

logging:
  wandb:
    project: Vision-CIFAR100
    entity: sebmoine-none
  logdir: "/home/sebnm/AIProjects/Vision-CIFAR-100/outputs/checkpoints"  # Better to provide the fullpath, especially on the cluster

plot:
  losses: "/home/sebnm/AIProjects/Vision-CIFAR-100/outputs/checkpoints"

model:
  # class: SimpleCNN
  # cout: 32        # Filters' number
  # num_layers: 3
  # hidden_size: 128 # Neural Network's hidden layer size

  class: myresnet44 #myresnet14 #smallresnet34
  dataset: cifar100
  inplace: 64

  # class : LoadResNet
  # class : LoadViT
