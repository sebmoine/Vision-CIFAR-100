data:
  batch_size: 256
  num_workers: 10
  val_ratio: 0.1

optim:
  algo: AdamW
  params:
    weight_decay: 0.05
    lr: 1e-4

earlystopping:
  patience: 5
  min_delta: 0

ROPscheduler:
  factor: 0.5
  patience: 2
  threshold: 0.001

nepochs: 300
loss: "CrossEntropyLoss"
amp: False

logging:
  wandb:
    project: Vision-CIFAR100
    entity: sebmoine-none
  logdir: "/home/sebnm/AIProjects/Vision-CIFAR-100/outputs/checkpoints"  # Better to provide the fullpath, especially on the cluster

plot:
  losses: "/home/sebnm/AIProjects/Vision-CIFAR-100/outputs/checkpoints"

